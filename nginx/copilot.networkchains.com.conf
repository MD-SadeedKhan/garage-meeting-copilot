# Host-level nginx config for meeting-copilot.
#
# Lives at /etc/nginx/sites-available/copilot.networkchains.com.conf
# on the droplet (symlinked into /etc/nginx/sites-enabled/ by the
# deploy workflow).
#
# After running certbot for the first time, certbot rewrites the
# listen 443 block + adds an :80 → :443 redirect. Don't hand-edit
# the certbot-managed bits.
#
# Container bindings (see docker-compose.deploy.yml):
#   127.0.0.1:8000 → ai-service (REST: /api/v1/copilot/*)
#   127.0.0.1:8001 → realtime-gateway (WS: /ws/copilot)
# Everything else (postgres, redis, qdrant) stays on the internal
# docker network.

upstream copilot_api {
    server 127.0.0.1:8000;
    keepalive 32;
}

upstream copilot_ws {
    server 127.0.0.1:8001;
    keepalive 16;
}

# WebSocket Upgrade map — nginx needs `$connection_upgrade` to flip
# between "upgrade" (when Upgrade header present) and "close"
# (regular HTTP keep-alive). Re-declaring it here is safe; nginx
# only complains on actual collisions.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP — certbot replaces this with an HTTPS redirect after issuing
# the certificate. Until then we keep the :80 listener so the
# http-01 challenge can succeed.
server {
    listen 80;
    listen [::]:80;
    server_name copilot.networkchains.com;

    location /health {
        proxy_pass http://copilot_api/health;
        proxy_set_header Host $host;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name copilot.networkchains.com;

    # TLS — cert issued by certbot, lives at the standard letsencrypt
    # path. The first deploy runs `certbot --nginx -d copilot.networkchains.com`
    # manually to obtain the cert; from then on these paths just work.
    ssl_certificate     /etc/letsencrypt/live/copilot.networkchains.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/copilot.networkchains.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Audio chunks are small (~8 KB) but the JWT + headers + cookies
    # combined sometimes push close to 8 KB on the request line — be
    # generous.
    large_client_header_buffers 4 16k;

    # Long-lived WebSocket keeps the upstream socket alive for the
    # duration of the meeting. Don't 504 on idle gaps in transcript.
    proxy_connect_timeout 60s;
    proxy_send_timeout    3600s;
    proxy_read_timeout    3600s;
    send_timeout          3600s;

    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Don't buffer streaming JSON events (SSE-like server-sent
    # tokens for the chat panel arrive on the WS, not here, but the
    # REST API also streams a couple of long-lived responses).
    proxy_buffering off;

    # ── WebSocket: realtime gateway ──────────────────────────────
    location /ws/ {
        proxy_pass http://copilot_ws;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ── REST API: sessions, transcripts, etc. ────────────────────
    location / {
        proxy_pass http://copilot_api;
        proxy_set_header Connection "";
    }
}

  # ─────────────────────────────────────────────
  # POSTGRESQL — Primary Datastore
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16.3-alpine
    container_name: copilot-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garage_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - copilot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copilot} -d ${POSTGRES_DB:-garage_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256mb

  # ─────────────────────────────────────────────
  # REDIS — Realtime State / Pub-Sub / Cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7.4-alpine
    container_name: copilot-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - copilot-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # QDRANT — Vector Memory Store
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: copilot-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
      - ./infrastructure/docker/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    networks:
      - copilot-internal
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:6333/readyz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334

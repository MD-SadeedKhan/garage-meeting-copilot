# ─────────────────────────────────────────────────────────────────────────────
# Garage Meeting Copilot — Server Virtual Host
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    # ── Security Headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                       always;
    add_header X-Content-Type-Options    "nosniff"                    always;
    add_header X-XSS-Protection          "1; mode=block"              always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(self), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Health check (internal only) ──────────────────────────────────────────
    location /nginx-health {
        access_log off;
        return 200 '{"status":"ok"}';
        add_header Content-Type application/json;
    }

    # ── WebSocket — Realtime Gateway ──────────────────────────────────────────
    location /ws/ {
        limit_req zone=ws_limit burst=5 nodelay;

        proxy_pass         http://realtime_gateway;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        # Generous timeouts for long-running meeting sessions
        proxy_connect_timeout   10s;
        proxy_send_timeout      7200s;
        proxy_read_timeout      7200s;

        # Disable proxy buffering for streaming
        proxy_buffering          off;
        proxy_cache              off;
        proxy_redirect           off;

        # Disable Nginx gzip for WebSocket
        gzip off;
    }

    # ── REST API — AI Service ─────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass         http://meeting_ai_service;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Connection         "";

        proxy_connect_timeout   10s;
        proxy_send_timeout      120s;
        proxy_read_timeout      120s;

        proxy_buffering         on;
    }

    # ── SSE streaming endpoints (no buffering) ────────────────────────────────
    location ~ ^/api/v1/copilot/(sessions/.+/stream|chat/stream) {
        proxy_pass         http://meeting_ai_service;
        proxy_http_version 1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header Connection         "";

        # Required for SSE
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      300s;

        add_header X-Accel-Buffering no;
        add_header Cache-Control     no-cache;
        add_header Content-Type      text/event-stream;
    }

    # ── Health endpoint passthrough ───────────────────────────────────────────
    location /health {
        proxy_pass         http://meeting_ai_service/health;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Gateway health ────────────────────────────────────────────────────────
    location /gateway/health {
        proxy_pass         http://realtime_gateway/health;
        proxy_http_version 1.1;
        access_log         off;
    }

    # ── Block common attack paths ─────────────────────────────────────────────
    location ~* \.(env|git|htaccess|DS_Store)$ {
        deny all;
        return 404;
    }

    # ── Default 404 ───────────────────────────────────────────────────────────
    location / {
        return 404 '{"error":"Not found"}';
        add_header Content-Type application/json;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# Garage Meeting Copilot — NGINX Configuration
# Optimised for realtime WebSocket streaming and AI API proxying
# ─────────────────────────────────────────────────────────────────────────────

user  nginx;
worker_processes  auto;
worker_rlimit_nofile  65535;
pid /var/run/nginx.pid;

error_log /var/log/nginx/error.log warn;

events {
    worker_connections  4096;
    multi_accept        on;
    use                 epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format  json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"remote_addr":"$remote_addr",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes":$body_bytes_sent,'
            '"request_time":$request_time,'
            '"upstream_time":"$upstream_response_time",'
            '"upstream_addr":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ── Core settings ─────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    keepalive_requests  1000;
    server_tokens       off;

    # ── Buffers — optimised for AI streaming ─────────────────────────────────
    client_max_body_size      64m;
    client_body_buffer_size   128k;
    proxy_buffer_size         16k;
    proxy_buffers             8 32k;
    proxy_busy_buffers_size   64k;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip               on;
    gzip_comp_level    5;
    gzip_min_length    1000;
    gzip_proxied       any;
    gzip_vary          on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        application/x-ndjson
        text/event-stream;

    # ── WebSocket upgrade map ─────────────────────────────────────────────────
    map $http_upgrade $connection_upgrade {
        default   upgrade;
        ''        close;
    }

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api_limit:20m  rate=60r/m;
    limit_req_zone  $binary_remote_addr zone=ws_limit:10m   rate=10r/m;

    # ── Upstream pools ────────────────────────────────────────────────────────
    upstream meeting_ai_service {
        least_conn;
        server meeting-ai-service:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream realtime_gateway {
        least_conn;
        server realtime-gateway:8001 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    include /etc/nginx/conf.d/*.conf;
}

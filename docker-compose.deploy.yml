# Production compose for meeting-copilot. The ai-service / realtime-
# gateway image is prebuilt by GitHub Actions and pushed to GHCR;
# this file pulls by tag instead of building from source.
#
# Lives at /opt/copilot/docker-compose.deploy.yml on the droplet.
# Required env on the host (/opt/copilot/.env):
#   IMAGE_TAG=...                # set by deploy GHA into .env.image
#   GARAGE_JWT_SECRET=...        # must match contacts-backend's JWT_SECRET
#   GARAGE_JWT_ALGORITHM=HS256
#   CONTACTS_BACKEND_BASE_URL=https://backend.networkchains.com
#   ALLOWED_ORIGINS=https://app.networkchains.com,https://networkchains.com
#   OPENAI_API_KEY=...
#   DEEPGRAM_API_KEY=...
#   SECRET_KEY=...               # 32+ chars random
#   POSTGRES_DB=garage_copilot
#   POSTGRES_USER=copilot
#   POSTGRES_PASSWORD=...
#   REDIS_PASSWORD=...
#   DATABASE_URL=postgresql+asyncpg://copilot:${POSTGRES_PASSWORD}@postgres:5432/garage_copilot
#   REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
#
# Memory limits are tuned for a 4 GB droplet — total cap ≈ 3.4 GB
# (OS + nginx eat the rest). Bump them when migrating to 8 GB.

name: meeting-copilot

networks:
  copilot-internal:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:

services:
  meeting-ai-service:
    image: ${IMAGE_BACKEND}:${IMAGE_TAG}
    container_name: copilot-ai-service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_NAME=meeting-ai-service
      - SERVICE_PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    # Bind to localhost only — public traffic comes through host-level
    # nginx (see nginx/copilot.networkchains.com.conf).
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - copilot-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 500m
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --workers
      - "2"
      - --loop
      - uvloop
      - --http
      - httptools

  realtime-gateway:
    image: ${IMAGE_BACKEND}:${IMAGE_TAG}
    container_name: copilot-realtime-gateway
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - SERVICE_NAME=realtime-gateway
      - SERVICE_PORT=8001
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - copilot-internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    mem_limit: 1g
    mem_reservation: 500m
    command:
      - uvicorn
      - app.gateway:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
      - --workers
      - "1"
      - --loop
      - uvloop
      - --http
      - httptools

  postgres:
    image: postgres:16.3-alpine
    container_name: copilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garage_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    # Don't expose to host — only ai-service / realtime-gateway need it.
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - copilot-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-copilot} -d ${POSTGRES_DB:-garage_copilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 400m
    shm_size: 128mb
    # Tune for 4 GB host — default Postgres assumes a fat box.
    command:
      - postgres
      - -c
      - shared_buffers=128MB
      - -c
      - effective_cache_size=512MB
      - -c
      - work_mem=8MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=50

  redis:
    image: redis:7.4-alpine
    container_name: copilot-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 384mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - copilot-internal
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 500m

  qdrant:
    image: qdrant/qdrant:v1.10.1
    container_name: copilot-qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - copilot-internal
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333'"]
      interval: 15s
      timeout: 10s
      retries: 5
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
    mem_limit: 600m
